services:
  database_amarath:
    container_name: database_amarath
    env_file:
      - .env
    image: postgres:16-alpine
    volumes:
      - database_amarath_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  redis_amarath:
    container_name: redis_amarath
    image: redis:latest
    restart: unless-stopped
    volumes:
      - redis_amarath_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}
  ollama_amarath:
    container_name: ollama_amarath
    image: alpine/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_amarath_data:/root/.ollama
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: '4096M'
  amarath:
    container_name: amarath
    build:
      context: ./amarath
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - 3000:3000
    depends_on:
      - database_amarath
      - redis_amarath
      - ollama_amarath
    restart: unless-stopped
volumes:
  ollama_amarath_data:
  database_amarath_data:
  redis_amarath_data: