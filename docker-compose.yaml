services:
  redis_amarolio:
    container_name: redis_amarolio
    image: redis:latest
    restart: unless-stopped
    volumes:
      - redis_amarolio_data:/data
    command: redis-server --requirepass ${AMAROLIO_REDIS_PASSWORD}
  database_amarath:
    environment:
      - POSTGRES_USER=${AMARATH_POSTGRES_USER}
      - POSTGRES_DB=${AMARATH_POSTGRES_DB}
      - POSTGRES_PASSWORD=${AMARATH_POSTGRES_PASSWORD}
    container_name: database_amarath
    image: postgres:16-alpine
    volumes:
      - database_amarath_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AMARATH_POSTGRES_USER} -d ${AMARATH_POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  redis_amarath:
    container_name: redis_amarath
    image: redis:latest
    restart: unless-stopped
    volumes:
      - redis_amarath_data:/data
    command: redis-server --requirepass ${AMARATH_REDIS_PASSWORD}
  ollama_amarath:
    container_name: ollama_amarath
    image: alpine/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_amarath_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        echo 'Waiting for Ollama server...' &&
        sleep 5 &&
        ollama pull ${MODEL_VARIANT} &&
        ollama pull ${TITLE_MODEL_VARIANT} &&
        echo 'All models ready!' &&
        wait
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q '${MODEL_VARIANT}' && ollama list | grep -q '${TITLE_MODEL_VARIANT}'"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
  amarath:
    env_file:
      - .env
    container_name: amarath
    build:
      context: ./amarath
      dockerfile: Dockerfile
    depends_on:
      database_amarath:
        condition: service_healthy
      redis_amarath:
        condition: service_started
      redis_amarolio:
        condition: service_started
      ollama_amarath:
        condition: service_healthy
    restart: unless-stopped
  database_auth:
    environment:
      - POSTGRES_USER=${AUTH_POSTGRES_USER}
      - POSTGRES_DB=${AUTH_POSTGRES_DB}
      - POSTGRES_PASSWORD=${AUTH_POSTGRES_PASSWORD}
    container_name: database_auth
    image: postgres:16-alpine
    volumes:
      - database_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_POSTGRES_USER} -d ${AUTH_POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  redis_auth:
    container_name: redis_auth
    image: redis:latest
    restart: unless-stopped
    volumes:
      - redis_auth_data:/data
    command: redis-server --requirepass ${AUTH_REDIS_PASSWORD}
  auth:
    env_file:
      - .env
    container_name: auth
    build:
      context: ./auth
      dockerfile: Dockerfile
    depends_on:
      database_auth:
        condition: service_healthy
      redis_auth:
        condition: service_started
    restart: unless-stopped
  database_amary:
    environment:
      - POSTGRES_USER=${AMARY_POSTGRES_USER}
      - POSTGRES_DB=${AMARY_POSTGRES_DB}
      - POSTGRES_PASSWORD=${AMARY_POSTGRES_PASSWORD}
    container_name: database_amary
    image: postgres:16-alpine
    volumes:
      - database_amary_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AMARY_POSTGRES_USER} -d ${AMARY_POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  redis_amary:
    container_name: redis_amary
    image: redis:latest
    restart: unless-stopped
    volumes:
      - redis_amary_data:/data
    command: redis-server --requirepass ${AMARY_REDIS_PASSWORD}
  amary:
    env_file:
      - .env
    container_name: amary
    build:
      context: ./amary
      dockerfile: Dockerfile
    depends_on:
      database_amary:
        condition: service_healthy
      redis_amary:
        condition: service_started
    restart: unless-stopped
  gateway:
    env_file:
      - .env
    container_name: gateway
    build:
      context: ./gateway
      dockerfile: Dockerfile
    depends_on:
      redis_amarolio:
        condition: service_started
    restart: unless-stopped
    ports:
      - ${SERVER_PORT}:${SERVER_PORT}
  
volumes:
  ollama_amarath_data:
  database_amarath_data:
  redis_amarath_data:
  database_auth_data:
  redis_auth_data:
  redis_amarolio_data:
  database_amary_data:
  redis_amary_data: